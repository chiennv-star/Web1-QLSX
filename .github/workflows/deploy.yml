name: Build, Push & Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/chiennv-star/sanluong-backend
  FRONTEND_IMAGE: ghcr.io/chiennv-star/sanluong-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build & push images lên ghcr.io ──────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login vào GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./sanluong-backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          no-cache: true

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./sanluong-frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          no-cache: true

  # ── Job 2: SSH vào server, pull image mới và restart ────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            # Đăng nhập ghcr.io để pull private image (nếu repo là private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true

            # Pull image mới nhất
            docker-compose pull

            # Dừng và xóa container cũ để tránh lỗi ContainerConfig
            docker-compose down

            # Khởi động lại với image mới
            docker-compose up -d

            # Xóa image cũ không dùng
            docker image prune -f

            echo "✅ Deploy thành công: $(date '+%Y-%m-%d %H:%M:%S')"
