<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhãn cân chia mẻ — A4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16181c;
    --accent:#3b5bdb;
    --bg:#e9ebef;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink)}

  /* ---------- Thanh công cụ (chỉ hiển thị trên màn hình) ---------- */
  .toolbar{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:#fff;border-bottom:1px solid #d6d9de;
    padding:12px 20px;
  }
  .toolbar h1{font-size:15px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px}
  .toolbar h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .toolbar .sub{font-size:12.5px;color:#6b7178}
  .spacer{flex:1}
  .btn{
    font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;
    border:1px solid #cfd3da;background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;
    transition:.12s;
  }
  .btn:hover{border-color:#9aa0a8}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#3450c8}
  .btn svg{width:15px;height:15px}

  .stage{padding:26px 20px 60px;display:flex;justify-content:center}

  /* ---------- Tờ A4 ---------- */
  .a4{
    width:210mm;min-height:297mm;background:#fff;
    box-shadow:0 6px 30px rgba(20,30,55,.12);
    padding:8mm;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(4,1fr);
    gap:4mm;
    height:279mm;            /* 297 - 2*8mm lề, chừa 2mm chống tràn trang */
  }

  /* ---------- Một nhãn ---------- */
  .label{
    border:1px solid #000;
    padding:3.2mm 4mm;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .label .company{
    font-size:8.2px;font-weight:600;letter-spacing:.03em;text-align:center;
    color:#222;line-height:1.2;text-transform:uppercase;
  }
  .label .title{
    font-size:13.5px;font-weight:700;text-align:center;letter-spacing:.04em;
    margin:1.5mm 0 2.5mm;padding-bottom:1.5mm;border-bottom:1px solid #000;
  }
  .fields{
    flex:1;display:grid;grid-template-columns:auto 1fr auto 1fr;
    align-content:space-between;gap:1.2mm 2mm;
  }
  .fields .k{font-size:10px;white-space:nowrap;align-self:end;padding-bottom:.3mm}
  .fields .fill{border-bottom:1px solid #555;min-height:4mm;align-self:end}
  .fields .k.wide{font-size:9.4px}

  /* ---------- In ---------- */
  @media print{
    @page{ size:A4 portrait; margin:8mm; }
    html,body{background:#fff;margin:0}
    .toolbar{display:none !important}
    .stage{padding:0}
    .a4{width:auto;min-height:auto;box-shadow:none;padding:0}
    .grid{height:279mm}
    .label{ -webkit-print-color-adjust:exact;print-color-adjust:exact; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <h1><span class="dot"></span>Nhãn cân chia mẻ</h1>
    <span class="sub">8 nhãn / tờ A4 — in vừa tròn 1 trang</span>
    <span class="spacer"></span>
    <button class="btn primary" id="btnPrint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
      In / Lưu PDF
    </button>
    <button class="btn" id="btnWord">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      Xuất Word (.doc)
    </button>
  </div>

  <div class="stage">
    <div class="a4">
      <div class="grid" id="grid"></div>
    </div>
  </div>

<script>
  /* Nguồn dữ liệu duy nhất cho cả màn hình lẫn bản Word */
  const COMPANY = "Công ty Cổ phần Mỹ phẩm Thiên nhiên Song An";
  const TITLE   = "NHÃN CÂN CHIA MẺ";
  const FIELDS  = [                       // [nhãn trái, nhãn phải]
    ["Tên NPL:",          "Mã:"],
    ["Khối lượng (g):",   "Khối lượng bì (g):"],
    ["Tên SP:",           "Số lô SP:"],
    ["Số mẻ:",            "Ngày TH:"],
    ["Người TH:",         "Người kiểm tra:"],
  ];
  const COUNT = 8;                          // 2 cột × 4 hàng

  /* ---------- Dựng bản màn hình / in ---------- */
  function labelHTML(){
    const rows = FIELDS.map(([l,r])=>{
      const cls = (l.length>13||r.length>13) ? 'k wide' : 'k';
      return `<span class="${cls}">${l}</span><span class="fill"></span>`
           + `<span class="${cls}">${r}</span><span class="fill"></span>`;
    }).join("");
    return `<div class="label">
      <div class="company">${COMPANY}</div>
      <div class="title">${TITLE}</div>
      <div class="fields">${rows}</div>
    </div>`;
  }
  document.getElementById('grid').innerHTML =
    Array.from({length:COUNT}, labelHTML).join("");

  document.getElementById('btnPrint').addEventListener('click', ()=>window.print());

  /* ---------- Xuất Word (.doc) — bố cục bằng table, giữ khổ A4 ---------- */
  function fieldCell(text){
    return `<td style="font-size:9.5pt;white-space:nowrap;padding:1pt 2pt 1pt 0">${text}</td>`
         + `<td style="border-bottom:.75pt solid #555;width:30%">&nbsp;</td>`;
  }
  function labelTable(){
    const rows = FIELDS.map(([l,r])=>
      `<tr>${fieldCell(l)}${fieldCell(r)}</tr>`).join("");
    return `<table cellspacing="0" cellpadding="0" style="width:100%;height:100%;border:.75pt solid #000;border-collapse:collapse">
      <tr><td colspan="4" style="padding:4pt 6pt 2pt">
        <p style="margin:0;text-align:center;font-size:8pt;font-weight:bold;text-transform:uppercase">${COMPANY}</p>
        <p style="margin:1pt 0 0;text-align:center;font-size:13pt;font-weight:bold;border-bottom:.75pt solid #000;padding-bottom:3pt">${TITLE}</p>
      </td></tr>
      <tr><td colspan="4" style="padding:3pt 6pt 5pt">
        <table cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse">${rows}</table>
      </td></tr>
    </table>`;
  }
  function buildWordDoc(){
    // lưới 2×4 nhãn bằng table ngoài
    let cells = "";
    for(let row=0; row<4; row++){
      cells += "<tr>";
      for(let col=0; col<2; col++){
        cells += `<td style="width:9.3cm;height:6.4cm;padding:1.5mm;vertical-align:top">${labelTable()}</td>`;
      }
      cells += "</tr>";
    }
    return `\uFEFF<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8">
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
<style>
@page Section1 { size:21.0cm 29.7cm; margin:0.8cm 0.8cm 0.8cm 0.8cm; }
div.Section1 { page:Section1; }
body{font-family:Arial,sans-serif;color:#000}
table{border-collapse:collapse}
p{font-family:Arial,sans-serif}
</style></head>
<body><div class="Section1">
<table cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse">${cells}</table>
</div></body></html>`;
  }
  document.getElementById('btnWord').addEventListener('click', ()=>{
    const blob = new Blob([buildWordDoc()], {type:'application/msword'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'nhan-can-chia-me.doc';
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
